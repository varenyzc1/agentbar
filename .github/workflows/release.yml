name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build macOS app
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: xcrun swift --version

      - name: Test
        continue-on-error: true
        run: |
          set -o pipefail
          xcrun swift test 2>&1 | tee swift-test.log

      - name: Build app bundle
        run: |
          set -euxo pipefail

          APP_NAME="AgentBar"
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_DIR=".build/release"
          APP_DIR=".build/${APP_NAME}.app"
          CONTENTS_DIR="${APP_DIR}/Contents"
          MACOS_DIR="${CONTENTS_DIR}/MacOS"

          xcrun swift build -c release --product "${APP_NAME}"

          rm -rf "${APP_DIR}"
          mkdir -p "${MACOS_DIR}"
          cp "${BUILD_DIR}/${APP_NAME}" "${MACOS_DIR}/${APP_NAME}"

          cat > "${CONTENTS_DIR}/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>${APP_NAME}</string>
            <key>CFBundleIdentifier</key>
            <string>com.agentbar.app</string>
            <key>CFBundleName</key>
            <string>${APP_NAME}</string>
            <key>CFBundleDisplayName</key>
            <string>${APP_NAME}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleVersion</key>
            <string>${GITHUB_RUN_NUMBER}</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          plutil -lint "${CONTENTS_DIR}/Info.plist"
          test -x "${MACOS_DIR}/${APP_NAME}"

      - name: Package zip
        run: ditto -c -k --keepParent .build/AgentBar.app AgentBar-macos.zip

      - name: Package dmg
        run: |
          set -euo pipefail

          # Install tools for DMG layout
          brew install create-dmg
          pip3 install Pillow

          APP_NAME="AgentBar"
          BG_W=660
          BG_H=400

          # --- Generate background image ---
          python3 <<'PYEOF'
          from PIL import Image, ImageDraw, ImageFont

          W, H = 660, 400

          # Gradient background: top #dce4f0 -> bottom #b8c4d4
          img = Image.new("RGB", (W, H))
          draw = ImageDraw.Draw(img)
          for y in range(H):
              t = y / H
              r = int(220 * (1 - t) + 184 * t)
              g = int(228 * (1 - t) + 196 * t)
              b = int(240 * (1 - t) + 212 * t)
              draw.line([(0, y), (W, y)], fill=(r, g, b))

          # Title text
          title = "Drag AgentBar to Applications"
          font = None
          for path in ["/System/Library/Fonts/SFNSRounded.ttf",
                       "/System/Library/Fonts/SFNS.ttf",
                       "/System/Library/Fonts/Helvetica.ttc",
                       "/System/Library/Fonts/SFCompact.ttf"]:
              try:
                  font = ImageFont.truetype(path, 20)
                  break
              except Exception:
                  continue
          if font is None:
              font = ImageFont.load_default()

          bbox = draw.textbbox((0, 0), title, font=font)
          tw = bbox[2] - bbox[0]
          draw.text(((W - tw) // 2, 30), title, fill=(70, 70, 80), font=font)

          # Arrow: three chevrons pointing right (progressively darker)
          cy = H // 2
          shades = [(140, 145, 155), (120, 125, 135), (100, 110, 125)]
          for i, dx in enumerate([0, 16, 32]):
              draw.polygon(
                  [(180 + dx, cy - 16), (200 + dx, cy), (180 + dx, cy + 16)],
                  fill=shades[i],
              )

          img.save("/tmp/dmg_bg.png")
          PYEOF

          # --- Stage the DMG contents ---
          STAGING=$(mktemp -d)
          cp -R ".build/${APP_NAME}.app" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          # --- Window layout ---
          ICON_L=180
          ICON_R=480
          ICON_CY=240
          win_w=$(( ICON_R - ICON_L + 120 + 160 ))
          win_h=$(( BG_H - 80 ))
          off_x=$(( (BG_W - win_w) / 2 ))
          off_y=40

          # create-dmg positions = icon center − window offset
          app_x=$(( ICON_L - off_x ))
          app_y=$(( ICON_CY - off_y ))
          app_drop_x=$(( ICON_R - off_x ))
          app_drop_y=$(( ICON_CY - off_y ))

          create-dmg \
            --volname "$APP_NAME" \
            --background /tmp/dmg_bg.png \
            --window-pos 200 120 \
            --window-size "$win_w" "$win_h" \
            --icon-size 100 \
            --icon "$APP_NAME.app" "$app_x" "$app_y" \
            --app-drop-link "$app_drop_x" "$app_drop_y" \
            "AgentBar-macos.dmg" \
            "$STAGING"

          rm -rf "$STAGING"

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AgentBar-macos.zip
            AgentBar-macos.dmg

      - name: Update Homebrew cask
        if: startsWith(github.ref, 'refs/tags/') && env.TAP_PAT != ''
        env:
          TAP_PAT: ${{ secrets.TAP_PAT }}
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          ZIP_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/AgentBar-macos.zip"
          SHA256="$(curl -fL "$ZIP_URL" | shasum -a 256 | awk '{print $1}')"

          git clone "https://x-access-token:${TAP_PAT}@github.com/varenyzc1/homebrew-agentbar.git" tap-repo

          perl -0pi -e "s/version \"[^\"]+\"/version \"${VERSION}\"/" tap-repo/Casks/agentbar.rb
          perl -0pi -e "s/sha256 \"[0-9a-f]+\"/sha256 \"${SHA256}\"/" tap-repo/Casks/agentbar.rb

          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/agentbar.rb
          git diff --cached --quiet || git commit -m "brew: update agentbar to ${VERSION}"
          git push origin main
