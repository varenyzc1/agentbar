name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build macOS app
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Show Swift version
        run: xcrun swift --version

      - name: Test
        continue-on-error: true
        run: |
          set -o pipefail
          xcrun swift test 2>&1 | tee swift-test.log

      - name: Build app bundle
        run: ./build.sh

      - name: Package zip
        run: ditto -c -k --keepParent .build/AgentBar.app AgentBar-macos.zip

      - name: Package dmg
        run: |
          hdiutil create \
            -volname AgentBar \
            -srcfolder .build/AgentBar.app \
            -ov \
            -format UDZO \
            AgentBar-macos.dmg

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AgentBar-macos.zip
            AgentBar-macos.dmg
