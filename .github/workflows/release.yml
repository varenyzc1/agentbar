name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Test and package
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: |
          sw_vers
          xcrun swift --version

      - name: Test
        run: |
          set -o pipefail
          xcrun swift test 2>&1 | tee swift-test.log

      - name: Build app bundle
        run: |
          set -o pipefail
          AGENTBAR_VERSION="${GITHUB_REF_NAME#v}" ./Scripts/build_app.sh 2>&1 | tee swift-build.log

      - name: Package release assets
        run: |
          ditto -c -k --keepParent .build/AgentBar.app AgentBar-macos.zip
          hdiutil create \
            -volname "AgentBar" \
            -srcfolder .build/AgentBar.app \
            -ov \
            -format UDZO \
            AgentBar-macos.dmg

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AgentBar-macos
          path: |
            AgentBar-macos.zip
            AgentBar-macos.dmg

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AgentBar-macos.zip
            AgentBar-macos.dmg
          generate_release_notes: true

      - name: Update Homebrew cask
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAP_PAT: ${{ secrets.TAP_PAT }}
        run: |
          if [[ -z "${TAP_PAT}" ]]; then
            echo "TAP_PAT is not set; skipping Homebrew cask update."
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          ZIP_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/AgentBar-macos.zip"
          SHA256="$(curl -fL "$ZIP_URL" | shasum -a 256 | awk '{print $1}')"

          git clone "https://x-access-token:${TAP_PAT}@github.com/varenyzc1/homebrew-agentbar.git" tap-repo

          perl -0pi -e "s/version \"[^\"]+\"/version \"${VERSION}\"/" tap-repo/Casks/agentbar.rb
          perl -0pi -e "s/sha256 \"[0-9a-f]+\"/sha256 \"${SHA256}\"/" tap-repo/Casks/agentbar.rb

          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/agentbar.rb
          git diff --cached --quiet || git commit -m "brew: update agentbar to ${VERSION}"
          git push origin main
