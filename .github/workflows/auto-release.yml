name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write

concurrency:
  group: auto-release-main
  cancel-in-progress: false

jobs:
  tag-and-release:
    name: Tag and start release
    runs-on: ubuntu-latest
    if: >-
      !contains(github.event.head_commit.message, '[skip release]') &&
      !contains(github.event.head_commit.message, '[no release]')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          base="${{ github.event.before }}"
          if [[ "$base" =~ ^0+$ ]] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            base="$(git rev-list --max-parents=0 HEAD)"
          fi

          changed_files="$(git diff --name-only "$base" HEAD)"
          release_pattern='^(Package\.swift|Sources/)'

          if grep -Eq "$release_pattern" <<< "$changed_files"; then
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "No app, core, or package changes; skipping release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "### Changed files"
            echo ""
            if [[ -n "$changed_files" ]]; then
              sed 's/^/- `/' <<< "$changed_files" | sed 's/$/`/'
            else
              echo "- None"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Compute next version
        id: version
        if: steps.changes.outputs.release == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if git tag --points-at HEAD --list 'v[0-9]*.[0-9]*.[0-9]*' | grep -q .; then
            echo "HEAD is already tagged; skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest="$(
            git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname |
              grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
              head -n 1
          )" || true

          if [[ -z "$latest" ]]; then
            latest="v0.0.0"
          fi

          range=""
          if git rev-parse "$latest" >/dev/null 2>&1; then
            range="${latest}..HEAD"
          fi

          messages="$(git log --format=%B ${range})"
          version="${latest#v}"
          IFS=. read -r major minor patch <<< "$version"

          if grep -Eq '(^|[[:space:]])BREAKING CHANGE:|^[a-zA-Z]+(\([^)]+\))?!:' <<< "$messages"; then
            major=$((major + 1))
            minor=0
            patch=0
            bump="major"
          elif grep -Eq '^feat(\([^)]+\))?:' <<< "$messages"; then
            minor=$((minor + 1))
            patch=0
            bump="minor"
          else
            patch=$((patch + 1))
            bump="patch"
          fi

          tag="v${major}.${minor}.${patch}"
          echo "latest=${latest}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "bump=${bump}" >> "$GITHUB_OUTPUT"

      - name: Create version tag
        if: steps.changes.outputs.release == 'true' && steps.version.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$tag"
          git push origin "$tag"

      - name: Start release workflow
        if: steps.changes.outputs.release == 'true' && steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.version.outputs.tag }}"
          gh workflow run release.yml --ref "$tag"

      - name: Summarize
        if: steps.changes.outputs.release == 'true' && steps.version.outputs.skip != 'true'
        shell: bash
        run: |
          {
            echo "### Auto release"
            echo ""
            echo "- Previous version: ${{ steps.version.outputs.latest }}"
            echo "- Bump: ${{ steps.version.outputs.bump }}"
            echo "- New version: ${{ steps.version.outputs.tag }}"
            echo "- Release workflow: \`.github/workflows/release.yml\`"
          } >> "$GITHUB_STEP_SUMMARY"
